<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const THEMES = {

      rose:   { name:"Rose",     emoji:"🌸", primary:"#f43f5e", secondary:"#e11d48", gradient:"linear-gradient(to bottom,#ffe4e6 0%,#f43f5e 55%,#881337 100%)", gradientSoft:"linear-gradient(135deg,#ffe4e6,#fecdd3)", cardBorder:"#fecdd3", accent:"#fb7185" },
      gold:   { name:"Or",       emoji:"✨", primary:"#d97706", secondary:"#b45309", gradient:"linear-gradient(to bottom,#fef3c7 0%,#f59e0b 55%,#78350f 100%)", gradientSoft:"linear-gradient(135deg,#fef3c7,#fde68a)", cardBorder:"#fde68a", accent:"#fbbf24" },
      sky:    { name:"Ciel",     emoji:"🩵", primary:"#0ea5e9", secondary:"#0284c7", gradient:"linear-gradient(to bottom,#e0f2fe 0%,#0ea5e9 55%,#0c4a6e 100%)", gradientSoft:"linear-gradient(135deg,#e0f2fe,#bae6fd)", cardBorder:"#bae6fd", accent:"#38bdf8" },

      { id:"FGY2WhTYpPnrIDTdsKH5", name:"Laura",   gender:"♀", desc:"Chaleureuse & naturelle" },
      { id:"cgSgspJ2msm6clMCkdW9", name:"Jessica", gender:"♀", desc:"Vive & lumineuse" },
      { id:"iP95p4xoKVk53GoZ742B", name:"Chris",   gender:"♂", desc:"Grave & rassurant" },
      { id:"nPczCjzI2devNBz1zQrb", name:"Brian",   gender:"♂", desc:"Profond & enveloppant" },

      { id:4, theme:"Personnel",          icon:"🌿", value:"Acheter une nouvelle voiture de luxe et profiter de chaque trajet" },
    ];

    const AFFIRMATIONS = [
      { id:1, text:"Je mérite tout ce que la vie a de plus beau à offrir", icon:"🌸" },
      { id:2, text:"L'abondance coule naturellement vers moi chaque jour", icon:"💰" },
      { id:3, text:"Je suis magnétique et j'attire tout ce qui m'est destiné", icon:"✨" },
      { id:4, text:"L'univers conspire en ma faveur à chaque instant", icon:"🌙" },
      { id:5, text:"Mon amour rayonne et attire l'amour en retour", icon:"💕" },
      { id:6, text:"Je suis alignée avec la santé, la joie et la prospérité", icon:"🌿" },
      { id:7, text:"Chaque jour je me rapproche davantage de mes rêves", icon:"🦋" },
      { id:8, text:"Ma confiance en moi est inébranlable et lumineuse", icon:"⭐" },
      { id:9, text:"Je vis la vie de mes rêves, ici et maintenant", icon:"🏡" },
      { id:10, text:"La réussite et le bonheur sont mon état naturel", icon:"🏆" },
    ];    const THEME_GROUPS = [
      { key:"amour",     label:"Amour & Relations",        icon:"💕", kw:["amour","relation","couple","mariage","mari","femme","partenaire","romantique","fiancé","love"] },
      { key:"finances",  label:"Finances & Abondance",     icon:"💰", kw:["argent","finance","richesse","abondance","revenu","salaire","fortune","prospérité"] },
      { key:"carriere",  label:"Carrière & Succès",         icon:"🚀", kw:["travail","carrière","emploi","job","entreprise","business","succès","professionnel","métier"] },
      { key:"sante",     label:"Santé & Bien-être",         icon:"🌿", kw:["santé","bien-être","corps","fitness","sport","énergie","forme","vitalité"] },
      { key:"personnel", label:"Vie Personnelle",           icon:"✨", kw:["voiture","maison","voyage","liberté","bonheur","famille","amis","rêve","style"] },
      { key:"spirituel", label:"Croissance & Spiritualité", icon:"🔮", kw:["spirituel","âme","univers","énergie","manifestation","intuition","paix","conscience"] },
    ];

    const CARD_GRADIENTS = {
      amour:    { emerald:["#d1fae5","#065f46"], violet:["#ede9fe","#4c1d95"], rose:["#ffe4e6","#9f1239"], gold:["#fef3c7","#92400e"], sky:["#e0f2fe","#075985"] },
      finances: { emerald:["#a7f3d0","#022c22"], violet:["#ddd6fe","#2e1065"], rose:["#fecdd3","#4c0519"], gold:["#fde68a","#451a03"], sky:["#bae6fd","#082f49"] },
      carriere: { emerald:["#ecfdf5","#059669"], violet:["#f5f3ff","#7c3aed"], rose:["#fff1f2","#e11d48"], gold:["#fffbeb","#d97706"], sky:["#f0f9ff","#0284c7"] },
      sante:    { emerald:["#d1fae5","#064e3b"], violet:["#ede9fe","#3b0764"], rose:["#ffe4e6","#881337"], gold:["#fef3c7","#451a03"], sky:["#e0f2fe","#082f49"] },
      personnel:{ emerald:["#f0fdf4","#10b981"], violet:["#faf5ff","#8b5cf6"], rose:["#fff1f2","#f43f5e"], gold:["#fefce8","#d97706"], sky:["#f0f9ff","#0ea5e9"] },
      spirituel:{ emerald:["#a7f3d0","#022c22"], violet:["#c4b5fd","#2e1065"], rose:["#fda4af","#4c0519"], gold:["#fcd34d","#451a03"], sky:["#7dd3fc","#0c4a6e"] },
      autres:   { emerald:["#d1fae5","#065f46"], violet:["#ede9fe","#4c1d95"], rose:["#ffe4e6","#9f1239"], gold:["#fef3c7","#92400e"], sky:["#e0f2fe","#075985"] },
    };

    function cardGrad(gk,tk){const g=CARD_GRADIENTS[gk]||CARD_GRADIENTS.autres;const[c1,c2]=g[tk]||g.emerald;return`linear-gradient(to bottom,${c1} 0%,${c2} 100%)`;}
    function groupManifestations(manifs){const used=new Set();const out=[];THEME_GROUPS.forEach(g=>{const items=manifs.filter(m=>!used.has(m.id)&&g.kw.some(k=>(m.theme+" "+m.value).toLowerCase().includes(k)));if(items.length){items.forEach(m=>used.add(m.id));out.push({...g,items});}});const rest=manifs.filter(m=>!used.has(m.id));if(rest.length)out.push({key:"autres",label:"Autres Désirs",icon:"🌟",items:rest});return out;}

    function getVoiceForProfile(voiceId){
      const voices=window.speechSynthesis.getVoices();
      const isFemale=["EXAVITQu4vr4xnSDxMaL","FGY2WhTYpPnrIDTdsKH5","cgSgspJ2msm6clMCkdW9"].includes(voiceId);
      const fr=voices.filter(v=>v.lang.startsWith("fr"));
      const en=voices.filter(v=>v.lang.startsWith("en"));
      const fn=["amelie","audrey","alice","marie","julie","claire","victoria","samantha","karen","moira","fiona"];
      const mn=["thomas","nicolas","daniel","alex","fred","pierre","robin"];
      const nm=(v,n)=>n.some(x=>v.name.toLowerCase().includes(x));
      return fr.find(v=>isFemale?nm(v,fn):nm(v,mn))||fr.find(v=>isFemale?!nm(v,mn):nm(v,mn))||fr[isFemale?0:fr.length-1]||en.find(v=>isFemale?nm(v,fn):nm(v,mn))||voices[0];
    }
    const VRATES={"EXAVITQu4vr4xnSDxMaL":{pitch:1.1,rate:0.88},"FGY2WhTYpPnrIDTdsKH5":{pitch:1.2,rate:0.92},"cgSgspJ2msm6clMCkdW9":{pitch:1.3,rate:0.96},"iP95p4xoKVk53GoZ742B":{pitch:0.82,rate:0.87},"nPczCjzI2devNBz1zQrb":{pitch:0.75,rate:0.84},"onwK4e9ZLuTAKqWW03F9":{pitch:0.90,rate:0.90}};

    function playAudio(text,voiceId,onEnd){
      return new Promise(resolve=>{
        if(!window.speechSynthesis){onEnd?.();resolve(null);return;}
        window.speechSynthesis.cancel();
        const speak=()=>{
          const u=new SpeechSynthesisUtterance(text);
          const v=getVoiceForProfile(voiceId);if(v)u.voice=v;
          const p=VRATES[voiceId]||{pitch:1.0,rate:0.88};u.pitch=p.pitch;u.rate=p.rate;u.lang="fr-FR";
          u.onend=()=>{onEnd?.();resolve(null);};u.onerror=()=>{onEnd?.();resolve(null);};
          window.speechSynthesis.speak(u);resolve({pause:()=>window.speechSynthesis.cancel()});
        };
        window.speechSynthesis.getVoices().length>0?speak():window.speechSynthesis.onvoiceschanged=speak;
      });
    }

    async function callClaude(prompt){
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const d=await r.json();return d.content?.map(b=>b.text||"").join("")||"";
    }

    const F={display:"'Playfair Display',serif",body:"'EB Garamond',serif",ui:"'Nunito',sans-serif",label:"'Cinzel',serif"};

    function Dots({color}){return<div style={{display:"flex",gap:6,justifyContent:"center",padding:"18px 0"}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:color,animation:`pulse 1.1s ${i*.2}s ease-in-out infinite`}}/>)}</div>;}

    function PlayBtn({text,voiceId,accent,size=44,darkBg=false}){
      const[playing,setPlaying]=useState(false);const[busy,setBusy]=useState(false);const ref=useRef(null);
      const toggle=async e=>{
        e?.stopPropagation();
        if(playing){ref.current?.pause?.();window.speechSynthesis?.cancel();setPlaying(false);ref.current=null;}
        else{setBusy(true);const a=await playAudio(text,voiceId,()=>{setPlaying(false);ref.current=null;});ref.current=a;setBusy(false);setPlaying(true);}
      };
      useEffect(()=>()=>{ref.current?.pause?.();window.speechSynthesis?.cancel();},[]);
      const bg=darkBg?(playing?"rgba(255,255,255,0.95)":"rgba(255,255,255,0.2)"):(playing?accent:`${accent}22`);
      return<button onClick={toggle} style={{width:size,height:size,borderRadius:"50%",border:"none",background:bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38,flexShrink:0,transition:"all 0.25s",boxShadow:playing?`0 4px 18px ${accent}55`:"none"}}>{busy?"⏳":playing?<span style={{color:darkBg?accent:"white"}}>⏸</span>:<span style={{color:darkBg?"white":accent,marginLeft:2}}>▶</span>}</button>;
    }

    function Chips({options,value,onChange,theme,darkMode}){const tc=darkMode?"#e2f0eb":"#1a2e22";return<div style={{display:"flex",flexWrap:"wrap",gap:8}}>{options.map(o=>{const sel=value===o;return<button key={o} onClick={()=>onChange(sel?"":o)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:F.ui,fontWeight:700,fontSize:13,background:sel?theme.gradient:(darkMode?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.05)"),color:sel?"white":tc,boxShadow:sel?`0 3px 10px ${theme.primary}40`:"none",transition:"all 0.2s"}}>{o}</button>;})}</div>;}

    const EP={name:"",city:"",age:"",gender:"",job:"",currentSituation:"",difficulties:"",whoAmI:"",lifeExperiences:"",loveStatus:"",partnerName:"",partnerDesc:"",loveGoals:"",cherished:"",lifeJoys:"",lifeGoals:"",dreamPlace:"",dreamHome:""};
    const PS=[
      {title:"🌸 Qui tu es",fields:[{key:"name",label:"Prénom (ou surnom)",placeholder:"Comment tu t'appelles ?",type:"text"},{key:"city",label:"Ville",placeholder:"Où tu habites ?",type:"text"},{key:"age",label:"Âge",placeholder:"Ton âge",type:"text"},{key:"gender",label:"Genre",type:"chips",options:["Femme","Homme","Non binaire","Ne souhaite pas dire"]}]},
      {title:"💼 Ta vie aujourd'hui",fields:[{key:"job",label:"Que fais-tu dans la vie ?",placeholder:"Ton métier...",rows:2},{key:"currentSituation",label:"Quelle est ta situation actuelle ?",placeholder:"Décris où tu en es...",rows:2},{key:"difficulties",label:"Quelles sont tes difficultés actuelles ?",placeholder:"Ce que tu veux transformer...",rows:3}]},
      {title:"✨ Ton histoire",fields:[{key:"whoAmI",label:"Qui es-tu ? Présente-toi",placeholder:"Ta personnalité...",rows:3},{key:"lifeExperiences",label:"Ce que tu as traversé",placeholder:"Tes épreuves, victoires...",rows:3}]},
      {title:"💕 Amour & Relations",fields:[{key:"loveStatus",label:"Situation amoureuse",type:"chips",options:["Célibataire","En couple","Fiancé(e)","Marié(e)","Divorcé(e)","Compliqué"]},{key:"partnerName",label:"Prénom de ton/ta partenaire",placeholder:"Si tu en as un·e...",type:"text"},{key:"partnerDesc",label:"Dis-m'en plus sur lui/elle",placeholder:"Comment il/elle est...",rows:2},{key:"loveGoals",label:"Tes objectifs en amour",placeholder:"Ce que tu veux vivre...",rows:2}]},
      {title:"🌟 Ce qui compte",fields:[{key:"cherished",label:"Les personnes qui te sont chères",placeholder:"Tes proches...",rows:2},{key:"lifeJoys",label:"Ce qui t'apporte le plus",placeholder:"Tes passions...",rows:2}]},
      {title:"🏡 Ta vie rêvée",fields:[{key:"lifeGoals",label:"Tes objectifs de vie",placeholder:"Ce que tu veux accomplir...",rows:2},{key:"dreamPlace",label:"Ton lieu de vie rêvé",placeholder:"Ville, pays...",rows:2},{key:"dreamHome",label:"Type de maison idéale",type:"chips",options:["Appartement","Château","Loft","Maison en bord de mer","Manoir","Studio cosy","Villa"]}]},
    ];

    function pCtx(p){if(!p)return"";return[p.name&&`Prénom:${p.name}`,p.age&&`Âge:${p.age}`,p.gender&&`Genre:${p.gender}`,p.city&&`Ville:${p.city}`,p.job&&`Profession:${p.job}`,p.currentSituation&&`Situation:${p.currentSituation}`,p.whoAmI&&`Personnalité:${p.whoAmI}`,p.loveStatus&&`Amour:${p.loveStatus}`,p.partnerName&&`Partenaire:${p.partnerName}`,p.dreamHome&&`Maison:${p.dreamHome}`,p.dreamPlace&&`Lieu:${p.dreamPlace}`,p.lifeGoals&&`Objectifs:${p.lifeGoals}`,p.cherished&&`Proches:${p.cherished}`].filter(Boolean).join(". ");}
    function StoriesTab({manifs,setManifs,profile,theme,darkMode,voice,themeKey}){
      const[stories,setStories]=useState({});const[loading,setLoading]=useState({});const[expanded,setExpanded]=useState(null);const[showPanel,setShowPanel]=useState(false);const[editItem,setEditItem]=useState(null);const[newName,setNewName]=useState("");
      const bg=darkMode?"#0f1a15":"#f0fdf4",card=darkMode?"#1a2e22":"#ffffff",tc=darkMode?"#e2f0eb":"#1a2e22",mu=darkMode?"#6b9e80":"#6b9e80";
      const generate=async m=>{setLoading(l=>({...l,[m.id]:true}));const ctx=pCtx(profile);try{const s=await callClaude(`Tu es un narrateur de manifestation inspirant. Écris une histoire (~300 mots, ~3min) à la 1ère personne, au présent, comme si le rêve était déjà réalisé.\nThème:${m.theme}\nDésir:"${m.value}"\n${ctx?`Contexte:${ctx}`:""}\nSensoriel, poétique, vivant. Pas de titre. Commence directement.`);setStories(prev=>({...prev,[m.id]:s}));}catch{setStories(p=>({...p,[m.id]:"Ton histoire se prépare avec amour... ✨"}));}setLoading(l=>({...l,[m.id]:false}));};
      useEffect(()=>{manifs.forEach(m=>{if(m.value&&!stories[m.id]&&!loading[m.id])generate(m);});},[manifs]);
      const saveEdit=(id,val)=>{setManifs(m=>m.map(x=>x.id===id?{...x,value:val}:x));const m=manifs.find(x=>x.id===id);if(m)generate({...m,value:val});};
      const del=id=>{setManifs(m=>m.filter(x=>x.id!==id));setStories(s=>{const n={...s};delete n[id];return n;});};
      const add=()=>{if(!newName.trim())return;const id=Date.now();const nm={id,theme:newName,icon:"🌟",value:""};setManifs(m=>[...m,nm]);setNewName("");setEditItem(nm);};
      const groups=groupManifestations(manifs);
      return(
        <div style={{background:bg,minHeight:"100%",paddingBottom:80}}>
          <div style={{padding:"56px 20px 24px",position:"relative",textAlign:"center"}}>
            <div style={{fontFamily:F.label,fontSize:10,fontWeight:600,color:theme.primary,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:5}}>Mes histoires ✨</div>
            <h1 style={{fontFamily:F.display,fontSize:28,color:tc,margin:0,fontWeight:700}}>Histoires</h1>
            <button onClick={()=>setShowPanel(true)} style={{position:"absolute",right:20,top:56,width:42,height:42,borderRadius:"50%",background:theme.gradient,border:"none",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 14px ${theme.primary}40`}}>⭐</button>
          </div>
          {groups.map((g,gi)=>(
            <div key={g.key} style={{marginBottom:32,animation:`fadeInUp 0.4s ${gi*.1}s both`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:20,marginBottom:14}}><span style={{fontSize:20}}>{g.icon}</span><h2 style={{fontFamily:F.display,fontWeight:700,fontSize:19,color:tc,margin:0}}>{g.label}</h2></div>
              <div style={{display:"flex",gap:14,overflowX:"auto",paddingLeft:20,paddingRight:20,paddingBottom:6,scrollbarWidth:"none"}}>
                {g.items.map(m=>{const grad=cardGrad(g.key,themeKey),txt=stories[m.id]||"",isL=!!loading[m.id];return(
                  <div key={m.id} onClick={()=>setExpanded(expanded?.manifestId===m.id?null:{manifestId:m.id,groupKey:g.key,label:m.theme,groupLabel:g.label})} style={{width:190,minWidth:190,height:220,borderRadius:22,background:grad,cursor:"pointer",padding:"18px 16px",display:"flex",flexDirection:"column",justifyContent:"space-between",position:"relative",overflow:"hidden",flexShrink:0,boxShadow:darkMode?"0 6px 24px rgba(0,0,0,0.4)":"0 6px 24px rgba(0,0,0,0.12)"}}>
                    <div style={{position:"absolute",top:-20,right:-20,width:70,height:70,borderRadius:"50%",background:"rgba(255,255,255,0.1)",pointerEvents:"none"}}/>
                    <div><div style={{fontFamily:F.label,fontWeight:600,fontSize:9,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:7}}>{m.theme}</div><p style={{fontFamily:F.display,fontWeight:600,fontSize:14,color:"white",lineHeight:1.5,margin:0,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{isL?"Génération...":txt?txt.slice(0,90)+"...":""}</p></div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>{isL?<Dots color="rgba(255,255,255,0.8)"/>:txt?<PlayBtn text={txt} voiceId={voice.id} accent="rgba(255,255,255,0.9)" size={38} darkBg={true}/>:null}{txt&&<span style={{fontFamily:F.ui,fontWeight:700,fontSize:10,color:"rgba(255,255,255,0.75)",textDecoration:"underline"}}>Lire →</span>}</div>
                  </div>
                );})}
              </div>
            </div>
          ))}

    function DailyTab({manifs,profile,theme,darkMode,voice}){
      const[story,setStory]=useState("");const[busy,setBusy]=useState(false);const[playing,setPlaying]=useState(false);const audioRef=useRef(null);
      const bg=darkMode?"#0f1a15":"#f0fdf4",card=darkMode?"#1a2e22":"#ffffff",tc=darkMode?"#e2f0eb":"#1a2e22",mu=darkMode?"#6b9e80":"#6b9e80";

      const genPlay=async()=>{audioRef.current?.pause?.();window.speechSynthesis?.cancel();setPlaying(false);setBusy(true);setStory("");const s2=manifs.map(m=>`${m.theme}:${m.value}`).join("\n");const ctx=pCtx(profile);let s="";try{s=await callClaude(`Tu es un narrateur de manifestation bienveillant.\nÉcris une histoire du jour (~500 mots,~5min) à la 1ère personne, au présent, englobant tous ces désirs:\n${s2}\n${ctx?`Contexte:${ctx}`:""}\nRaconte une journée entière:matin,journée,soir. Poétique,sensoriel,joyeux. Pas de titre.`);}catch{s="Ta journée idéale se déploie avec douceur...";}setStory(s);setBusy(false);setPlaying(true);const a=await playAudio(s,voice.id,()=>{setPlaying(false);audioRef.current=null;});audioRef.current=a;};
      const togglePlay=async()=>{if(playing){audioRef.current?.pause?.();window.speechSynthesis?.cancel();setPlaying(false);audioRef.current=null;}else if(story){setPlaying(true);const a=await playAudio(story,voice.id,()=>{setPlaying(false);audioRef.current=null;});audioRef.current=a;}else genPlay();};
      useEffect(()=>()=>{audioRef.current?.pause?.();window.speechSynthesis?.cancel();},[]);
      return(
        <div style={{background:bg,minHeight:"100%",paddingBottom:80}}>
          <div style={{background:hg,paddingTop:56,paddingBottom:40,paddingLeft:20,paddingRight:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
            {[...Array(4)].map((_,i)=><div key={i} style={{position:"absolute",top:`${8+i*22}%`,left:`${10+i*22}%`,width:50+i*18,height:50+i*18,borderRadius:"50%",background:"rgba(255,255,255,0.07)",pointerEvents:"none"}}/>)}
            <div style={{fontFamily:F.label,fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.65)",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:8}}>Aujourd'hui</div>
            <h1 style={{fontFamily:F.display,fontSize:30,color:"white",fontWeight:700,margin:"0 0 6px",textShadow:"0 2px 16px rgba(0,0,0,0.25)"}}>Histoire du Jour</h1>

              {busy?<div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:theme.primary,animation:`pulse 1s ${i*.2}s infinite`}}/>)}</div>:playing?<span style={{color:theme.primary}}>⏸</span>:<span style={{color:theme.primary,marginLeft:4}}>▶</span>}
            </button>
            <p style={{fontFamily:F.ui,fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:12}}>{busy?"Génération en cours...":story?(playing?"En lecture...":"Relancer l'histoire"):"Appuie pour générer & écouter"}</p>

    function AffirmationsTab({theme,darkMode,voice}){

      const bg=darkMode?"#0f1a15":"#f0fdf4",card=darkMode?"#1a2e22":"#ffffff",tc=darkMode?"#e2f0eb":"#1a2e22",mu=darkMode?"#6b9e80":"#6b9e80";
      const current=deck[deck.length-1];
      const swipe=dir=>{if(!current)return;setSweeping(dir);if(dir==="right")setLiked(l=>[...l,current]);setTimeout(()=>{setDeck(d=>d.slice(0,-1));setSweeping(null);setDragX(0);},280);};

      const oDM=e=>{if(startX.current==null)return;setDragX((e.touches?.[0]?.clientX??e.clientX)-startX.current);};
      const oDE=()=>{if(Math.abs(dragX)>80)swipe(dragX>0?"right":"left");else setDragX(0);startX.current=null;};
      const rot=sweeping==="right"?20:sweeping==="left"?-20:dragX/14;
      const tx=sweeping?(sweeping==="right"?420:-420):dragX;
      return(
        <div style={{background:bg,minHeight:"100%",paddingBottom:80}}>

                {dragX<-40&&<div style={{position:"absolute",top:24,right:24,background:"#f43f5e",borderRadius:10,padding:"6px 14px",fontFamily:F.ui,fontWeight:800,fontSize:15,color:"white",opacity:Math.min(1,-dragX/100)}}>Passer 👋</div>}
                <div style={{fontSize:48,marginBottom:20}}>{current.icon}</div>
                <p style={{fontFamily:F.display,fontSize:21,color:tc,textAlign:"center",lineHeight:1.6,fontStyle:"italic",margin:0}}>"{current.text}"</p>
              </div>:<div style={{position:"absolute",inset:0,background:card,borderRadius:28,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:`2px dashed ${theme.cardBorder}`}}><div style={{fontSize:44,marginBottom:12}}>🎉</div><p style={{fontFamily:F.ui,color:mu,textAlign:"center",fontSize:14,padding:"0 20px"}}>Tu as parcouru toutes les affirmations !</p><button onClick={()=>setDeck([...AFFIRMATIONS])} style={{marginTop:14,padding:"10px 20px",borderRadius:12,background:theme.gradient,border:"none",color:"white",fontFamily:F.ui,fontWeight:700,cursor:"pointer"}}>🔄 Recommencer</button></div>}
            </div>
            {current&&<div style={{display:"flex",justifyContent:"center",gap:28,marginBottom:16}}><button onClick={()=>swipe("left")} style={{width:56,height:56,borderRadius:"50%",border:"2.5px solid #f43f5e",background:"none",fontSize:20,cursor:"pointer",color:"#f43f5e"}}>✕</button><button onClick={()=>swipe("right")} style={{width:64,height:64,borderRadius:"50%",border:"none",background:theme.gradient,fontSize:24,cursor:"pointer",boxShadow:`0 6px 20px ${theme.primary}40`}}>❤️</button></div>}
            <p style={{fontFamily:F.ui,fontSize:12,color:mu,textAlign:"center"}}>Glisse à droite pour aimer · à gauche pour passer</p>
          </div>
          {showFavs&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end",backdropFilter:"blur(6px)"}}>

            </div>
          </div>}
        </div>

              </div>}
            </div>
            <div style={{background:card,borderRadius:24,overflow:"hidden",boxShadow:darkMode?"0 4px 20px rgba(0,0,0,0.3)":"0 4px 20px rgba(0,0,0,0.06)"}}>
              <div style={{padding:"20px",borderBottom:`1px solid ${br}`}}><h2 style={{fontFamily:F.display,fontSize:19,color:tc,margin:0,fontWeight:700}}>🎨 Thème de couleurs</h2></div>
              <div style={{padding:"16px 20px",display:"flex",gap:10,flexWrap:"wrap"}}>{Object.entries(THEMES).map(([k,t])=><button key={k} onClick={()=>setThemeKey(k)} style={{flex:"1 1 calc(33% - 8px)",padding:"12px 8px",borderRadius:16,border:themeKey===k?`3px solid ${t.primary}`:`2px solid ${t.cardBorder}`,background:themeKey===k?t.gradientSoft:(darkMode?"#0f1a15":"white"),cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{width:28,height:28,borderRadius:"50%",background:t.gradient}}/><span style={{fontFamily:F.ui,fontWeight:700,fontSize:11,color:tc}}>{t.name}</span><span style={{fontSize:14}}>{t.emoji}</span></button>)}</div>
              <div style={{padding:"14px 20px 20px",borderTop:`1px solid ${br}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontFamily:F.ui,fontWeight:700,fontSize:15,color:tc}}>🌙 Mode sombre</div><div style={{fontFamily:F.ui,fontSize:12,color:mu}}>Assombrit le thème choisi</div></div><button onClick={()=>setDarkMode(d=>!d)} style={{width:52,height:28,borderRadius:14,background:darkMode?theme.primary:"#d1d5db",border:"none",cursor:"pointer",position:"relative",transition:"background 0.3s"}}><div style={{width:22,height:22,borderRadius:"50%",background:"white",position:"absolute",top:3,left:darkMode?27:3,transition:"left 0.3s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/></button></div>
            </div>
            <div style={{background:card,borderRadius:24,overflow:"hidden",boxShadow:darkMode?"0 4px 20px rgba(0,0,0,0.3)":"0 4px 20px rgba(0,0,0,0.06)"}}>
              <div style={{padding:"20px",borderBottom:`1px solid ${br}`}}><h2 style={{fontFamily:F.display,fontSize:19,color:tc,margin:0,fontWeight:700}}>🎙️ Voix</h2><p style={{fontFamily:F.ui,fontSize:12,color:mu,margin:"4px 0 0"}}>Choisis la voix qui lira tes histoires</p></div>
              <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:10}}>
                {[{label:"♀ Voix féminines",voices:EL_VOICES.filter(v=>v.gender==="♀")},{label:"♂ Voix masculines",voices:EL_VOICES.filter(v=>v.gender==="♂")}].map(grp=><div key={grp.label}><div style={{fontFamily:F.ui,fontWeight:700,fontSize:11,color:mu,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>{grp.label}</div>{grp.voices.map(v=>{const det=getVoiceForProfile(v.id)?.name;return<div key={v.id} onClick={()=>setVoiceId(v.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:14,marginBottom:6,cursor:"pointer",background:voiceId===v.id?theme.gradientSoft:"transparent",border:voiceId===v.id?`2px solid ${theme.primary}`:"2px solid transparent",transition:"all 0.2s"}}><div style={{width:36,height:36,borderRadius:"50%",background:voiceId===v.id?theme.gradient:(darkMode?"#0f1a15":"#f0f0f0"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>🎤</div><div style={{flex:1}}><div style={{fontFamily:F.display,fontWeight:600,fontSize:14,color:tc}}>{v.name} <span style={{fontSize:11}}>{v.gender}</span></div><div style={{fontFamily:F.ui,fontSize:11,color:mu}}>{v.desc}</div>{det&&<div style={{fontFamily:F.ui,fontSize:10,color:theme.primary,marginTop:2}}>🔊 {det}</div>}</div><button onClick={async e=>{e.stopPropagation();await playAudio(`Bonjour, je suis ${v.name}. Je serai ta voix pour tes histoires.`,v.id,()=>{});}} style={{padding:"6px 12px",borderRadius:10,border:`1.5px solid ${theme.primary}`,background:"none",fontFamily:F.ui,fontWeight:600,fontSize:12,color:theme.primary,cursor:"pointer"}}>▶ Test</button></div>;})}
                </div>)}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App(){
      const[tab,setTab]=useState("stories");const[manifs,setManifs]=useState(DEFAULT_MANIF);const[profile,setProfile]=useState(null);const[darkMode,setDarkMode]=useState(false);const[themeKey,setThemeKey]=useState("emerald");const[voiceId,setVoiceId]=useState(EL_VOICES[0].id);
      const theme=THEMES[themeKey],voice=EL_VOICES.find(v=>v.id===voiceId)||EL_VOICES[0];
      const isMobile=window.innerWidth<=430;
      const nav=[{id:"stories",label:"Histoires"},{id:"daily",label:"Du Jour"},{id:"affirmations",label:"Affirmations"},{id:"profile",label:"Profil"}];
      const ps=isMobile?{width:"100vw",height:"100vh",borderRadius:0,boxShadow:"none"}:{width:390,height:844,borderRadius:52,boxShadow:"0 50px 100px rgba(0,0,0,0.3),inset 0 0 0 10px #1a1a1a"};
      return(
        <>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&display=swap');`}</style>
          <div style={{...ps,background:darkMode?"#0f1a15":"#f0fdf4",overflow:"hidden",position:"relative",transition:"background 0.3s"}}>
            {!isMobile&&<div style={{padding:"16px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center",background:darkMode?"#0f1a15":"#f0fdf4"}}><span style={{fontFamily:F.ui,fontWeight:900,fontSize:15,color:darkMode?"#e2f0eb":"#1a2e22"}}>9:41</span><div style={{width:110,height:28,background:"#1a1a1a",borderRadius:20}}/><span style={{color:darkMode?"#e2f0eb":"#1a2e22",fontSize:13}}>●●●</span></div>}
            <div style={{height:isMobile?"calc(100vh - 58px)":"744px",overflowY:"auto"}}>
              {tab==="stories"&&<StoriesTab manifs={manifs} setManifs={setManifs} profile={profile} theme={theme} darkMode={darkMode} voice={voice} themeKey={themeKey}/>}
              {tab==="daily"&&<DailyTab manifs={manifs} profile={profile} theme={theme} darkMode={darkMode} voice={voice}/>}
              {tab==="affirmations"&&<AffirmationsTab theme={theme} darkMode={darkMode} voice={voice}/>}
              {tab==="profile"&&<ProfileTab profile={profile} setProfile={setProfile} theme={theme} darkMode={darkMode} setDarkMode={setDarkMode} themeKey={themeKey} setThemeKey={setThemeKey} voiceId={voiceId} setVoiceId={setVoiceId}/>}
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:darkMode?"rgba(15,26,21,0.97)":"rgba(240,253,244,0.97)",backdropFilter:"blur(16px)",borderTop:`1px solid ${darkMode?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.06)"}`,display:"flex",paddingBottom:isMobile?"env(safe-area-inset-bottom,10px)":"10px",paddingTop:8}}>
              {nav.map(item=>{const active=tab===item.id;return<button key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 4px",border:"none",background:"none",cursor:"pointer"}}><div style={{padding:"6px 10px",borderRadius:12,background:active?theme.gradientSoft:"transparent",border:active?`1.5px solid ${theme.cardBorder}`:"1.5px solid transparent",transition:"all 0.2s"}}><span style={{fontFamily:F.ui,fontWeight:active?800:600,fontSize:12,color:active?theme.primary:(darkMode?"#7bb89a":"#7aaa90"),whiteSpace:"nowrap"}}>{item.label}</span></div></button>;})}
            </div>
          </div>
        </>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
